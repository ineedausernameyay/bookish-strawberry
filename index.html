<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Dontchangetitle</title>
    <style>
        :root {
            --ios-radius: 20px;
            --font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Helvetica Neue", Arial, sans-serif;
            --ig-secondary-btn: #efefef;
            --ig-icon-inactive: #8e8e8e;
            --border-color-white: #ffffff;
        }

        /* 基础重置 & 隐藏所有滚动条 */
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; outline: none; }
        ::-webkit-scrollbar { display: none; }
        * { -ms-overflow-style: none; scrollbar-width: none; }

        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background: #ffffff; font-family: var(--font-family); display: flex; justify-content: center; align-items: center; overflow: hidden; }

        #phone-wrapper { position: relative; background: #fff; overflow: hidden; transition: width 0.1s, height 0.1s; display: flex; flex-direction: column; }
        .has-frame { border: 12px solid #1c1c1e; border-radius: 45px; box-shadow: 0 30px 60px rgba(0,0,0,0.3); }
        .is-fullscreen { width: 100vw !important; height: 100vh !important; border: none !important; border-radius: 0 !important; }

        #phone-container { flex: 1; position: relative; display: flex; flex-direction: column; background-color: #ffffff; background-size: cover; background-position: center; overflow: hidden; }

        /* 状态栏：层级最高 */
        .status-bar { height: 44px; display: flex; justify-content: space-between; align-items: center; padding: 0 24px; font-size: 14px; font-weight: 600; z-index: 3000; color: #000; position: relative; }
        .status-icons { display: flex; gap: 8px; align-items: center; }
        .icon-svg { height: 14px; fill: currentColor; }

        /* 主屏幕网格 */
        .home-screen { flex: 1; padding: 20px 25px; display: grid; grid-template-columns: repeat(4, 50px); justify-content: space-between; align-content: start; gap: 30px 0; }
        .app-icon { display: flex; flex-direction: column; align-items: center; cursor: pointer; }
        .app-icon-box { 
            width: 50px; height: 50px; border-radius: 12px; 
            background: #000; display: flex; align-items: center; 
            justify-content: center; box-shadow: 0 2px 5px rgba(0,0,0,0.1); 
            font-size: 22px; color: #fff; font-weight: 600;
        }
        .app-icon span { color: #000; font-size: 11px; margin-top: 6px; font-weight: 500; text-align: center; width: 60px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

        /* 应用窗口：Padding-top 留出状态栏 */
        .app-window { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: #fff; z-index: 2000; display: none; flex-direction: column; padding-top: 44px; }
        #app-body { flex: 1; overflow-y: auto; background: #fff; }
        .app-header { padding: 5px 16px 10px; display: flex; justify-content: space-between; align-items: center; border-bottom: 0.5px solid var(--border-color-white); }
        .close-icon { font-size: 22px; font-weight: 300; color: #000; cursor: pointer; }

        /* Instagram 内部样式 */
        .ig-nav-top { display: flex; justify-content: space-between; align-items: center; padding: 4px 16px 0; font-size: 18px; font-weight: 700; }
        .ig-stats-row { display: flex; align-items: center; justify-content: space-between; padding: 10px 16px; }
        .ig-avatar { width: 80px; height: 80px; border-radius: 50%; border: 1px solid var(--border-color-white); object-fit: cover; }
        .ig-stats-box { display: flex; flex: 1; justify-content: space-around; margin-left: 15px; }
        .ig-stat-item { text-align: left; }
        .stat-num { font-weight: 700; font-size: 16px; display: block; }
        .stat-label { font-size: 13px; color: #262626; }
        .ig-bio-section { padding: 0 16px 10px; font-size: 14px; }
        .ig-action-btns { display: flex; gap: 6px; padding: 0 16px; }
        .ig-btn { flex: 1; background: var(--ig-secondary-btn); border: none; border-radius: 8px; height: 32px; font-weight: 600; font-size: 13px; }
        .ig-tab-bar { display: flex; margin-top: 14px; border-top: 0.5px solid var(--border-color-white); }
        .ig-tab { flex: 1; display: flex; justify-content: center; padding: 12px 0; cursor: pointer; }
        .ig-tab.active { border-bottom: 1px solid #000; }
        .ig-tab svg { width: 24px; height: 24px; stroke: var(--ig-icon-inactive); fill: none; }
        .ig-tab.active svg { stroke: #000; }
        .ig-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 1px; background: #fff; }
        .ig-grid-item { aspect-ratio: 1; background: #fafafa; }
        .ig-grid-item img { width: 100%; height: 100%; object-fit: cover; }

        /* Themes 紧凑布局：适应画面不滑动 */
        .theme-panel { padding: 10px; display: flex; flex-direction: column; gap: 10px; }
        .tool-card { background: #f9f9f9; padding: 12px; border-radius: 12px; border: 1px solid var(--border-color-white); }
        .tool-card h4 { margin: 0 0 8px; font-size: 13px; color: #333; }
        .range-group { margin-bottom: 10px; }
        .range-group label { font-size: 11px; display: block; margin-bottom: 3px; color: #666; }
        .range-group input { width: 100%; height: 4px; accent-color: #000; cursor: pointer; }
        
        .icon-edit-row { display: flex; align-items: center; gap: 8px; margin-bottom: 6px; }
        .mini-icon { width: 24px; height: 24px; border-radius: 5px; background: #000; color: #fff; display: flex; align-items: center; justify-content: center; font-size: 11px; font-weight: bold; flex-shrink: 0; }
        .icon-edit-row input { padding: 4px 6px; border: 1px solid #eee; border-radius: 4px; font-size: 11px; outline: none; }
        .input-letter { width: 35px; text-align: center; }
        .input-name { flex: 1; }
        
        .btn-black { background: #000; color: #fff; border: none; padding: 10px; border-radius: 8px; width: 100%; font-weight: 600; font-size: 12px; cursor: pointer; }
        input[type="file"] { display: none; }
    </style>
</head>
<body>

<div id="phone-wrapper" class="has-frame">
    <div id="phone-container">
        <div class="status-bar">
            <span id="clock">12:00</span>
            <div class="status-icons">
                <svg class="icon-svg" viewBox="0 0 24 24"><path d="M18.5 5v14.5M14.5 9v10.5M10.5 13v6.5M6.5 16v3.5" stroke="currentColor" stroke-width="2.5" fill="none"/></svg>
                <svg class="icon-svg" viewBox="0 0 24 24"><path d="M12 18.5l-8.5-9a11 11 0 0 1 17 0z" fill="currentColor"/></svg>
                <svg class="icon-svg" viewBox="0 0 24 24"><rect x="2" y="7" width="16" height="10" rx="2" stroke="currentColor" stroke-width="2" fill="none"/><rect x="4" y="9" width="11" height="6" rx="1" fill="currentColor"/><path d="M20 10v4" stroke="currentColor" stroke-width="2"/></svg>
            </div>
        </div>

        <div class="home-screen" id="home-grid"></div>

        <div id="app-layer" class="app-window">
            <div class="app-header">
                <span id="app-back-btn" class="close-icon">✕</span>
                <b id="active-app-name" style="font-size: 14px;"></b>
                <span id="app-action-btn" style="color:#0095f6; cursor:pointer; font-weight:600; font-size: 13px;"></span>
            </div>
            <div id="app-body"></div>
        </div>
    </div>
</div>

<script>
    const DEFAULT_AVATAR = "data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 512 512'%3E%3Cpath fill='%23DBDBDB' d='M256 0C114.6 0 0 114.6 0 256s114.6 256 256 256 256-114.6 256-256S397.4 0 256 0zm0 464c-114.7 0-208-93.3-208-208S141.3 48 256 48s208 93.3 208 208-93.3 208-208 208z'/%3E%3Cpath fill='%23DBDBDB' d='M256 128c-44.1 0-80 35.9-80 80s35.9 80 80 80 80-35.9 80-80-35.9-80-80-80zm0 128c-26.5 0-48-21.5-48-48s21.5-48 48-48 48 21.5 48 48-21.5 48-48 48zm0 48c-70.7 0-128 57.3-128 128 0 8.8 7.2 16 16 16h224c8.8 0 16-7.2 16-16 0-70.7-57.3-128-128-128z'/%3E%3C/svg%3E";

    const INITIAL_STATE = {
        frameEnabled: true,
        width: 375, height: 750,
        wallpaper: '#FFFFFF',
        userName: 'username', bio: '',
        postCount: '0', followers: '0', following: '0',
        userAvatar: DEFAULT_AVATAR,
        gridImages: Array(9).fill('data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAAEAAAABCAYAAAAfFcSJAAAADUlEQVR42mN88P8/AAb0An7f96S3AAAAAElFTkSuQmCC'),
        apps: [
            { id: 'space', name: 'Instagram', letter: 'I' },
            { id: 'theme', name: 'Themes', letter: 'T' },
            { id: 'album', name: 'Photos', letter: 'P' },
            { id: 'setting', name: 'Settings', letter: 'S' }
        ]
    };

    let state = JSON.parse(localStorage.getItem('SIM_Pixel_V105')) || INITIAL_STATE;

    window.simulatorAPI = {
        save() { localStorage.setItem('SIM_Pixel_V105', JSON.stringify(state)); },
        renderMain() {
            const wrapper = document.getElementById('phone-wrapper');
            const container = document.getElementById('phone-container');
            wrapper.className = state.frameEnabled ? 'has-frame' : 'is-fullscreen';
            if(state.frameEnabled) { wrapper.style.width = state.width + 'px'; wrapper.style.height = state.height + 'px'; }
            container.style.backgroundColor = state.wallpaper.startsWith('#') ? state.wallpaper : '';
            container.style.backgroundImage = state.wallpaper.startsWith('#') ? 'none' : `url(${state.wallpaper})`;
            const home = document.getElementById('home-grid');
            home.innerHTML = '';
            state.apps.forEach(app => {
                const div = document.createElement('div'); div.className = 'app-icon';
                div.innerHTML = `<div class="app-icon-box">${app.letter}</div><span>${app.name}</span>`;
                div.onclick = () => this.openApp(app.id);
                home.appendChild(div);
            });
            const d = new Date(); document.getElementById('clock').innerText = String(d.getHours()).padStart(2,'0') + ":" + String(d.getMinutes()).padStart(2, '0');
        },
        openApp(id) {
            const layer = document.getElementById('app-layer'), body = document.getElementById('app-body'), actionBtn = document.getElementById('app-action-btn'), backBtn = document.getElementById('app-back-btn'), activeTitle = document.getElementById('active-app-name');
            layer.style.display = 'flex'; body.innerHTML = ''; actionBtn.innerText = '';
            backBtn.onclick = () => this.closeApp();
            if(id === 'space') { activeTitle.innerText = ''; this.renderIG(body); }
            else if(id === 'theme') { activeTitle.innerText = 'Themes'; this.renderTheme(body); }
            else if(id === 'edit_profile') { 
                activeTitle.innerText = 'Edit profile'; 
                backBtn.onclick = () => this.openApp('space');
                actionBtn.innerText = 'Done';
                actionBtn.onclick = () => {
                    state.userName = document.getElementById('in-name').value;
                    state.bio = document.getElementById('in-bio').value;
                    state.postCount = document.getElementById('in-posts').value;
                    state.followers = document.getElementById('in-followers').value;
                    state.following = document.getElementById('in-following').value;
                    this.save(); this.openApp('space');
                };
                this.renderEdit(body);
            }
        },
        closeApp() { document.getElementById('app-layer').style.display = 'none'; },
        renderIG(container) {
            container.innerHTML = `
                <div class="ig-nav-top"><span>@${state.userName}</span><b>☰</b></div>
                <div class="ig-stats-row">
                    <img src="${state.userAvatar}" class="ig-avatar" onclick="document.getElementById('f-av').click()">
                    <input type="file" id="f-av" onchange="simulatorAPI.upload(this, 'avatar')">
                    <div class="ig-stats-box">
                        <div class="ig-stat-item"><span class="stat-num">${state.postCount}</span><span class="stat-label">posts</span></div>
                        <div class="ig-stat-item"><span class="stat-num">${state.followers}</span><span class="stat-label">followers</span></div>
                        <div class="ig-stat-item"><span class="stat-num">${state.following}</span><span class="stat-label">following</span></div>
                    </div>
                </div>
                <div class="ig-bio-section"><b>${state.userName}</b><div style="white-space:pre-wrap;">${state.bio}</div></div>
                <div class="ig-action-btns">
                    <button class="ig-btn" onclick="simulatorAPI.openApp('edit_profile')">Edit profile</button>
                    <button class="ig-btn">Share profile</button>
                </div>
                <div class="ig-tab-bar">
                    <div class="ig-tab active"><svg viewBox="0 0 24 24"><rect x="3" y="3" width="18" height="18" rx="1" fill="#000"></rect><line x1="3" y1="9" x2="21" y2="9" stroke="#fff"></line><line x1="3" y1="15" x2="21" y2="15" stroke="#fff"></line><line x1="9" y1="3" x2="9" y2="21" stroke="#fff"></line><line x1="15" y1="3" x2="15" y2="21" stroke="#fff"></line></svg></div>
                    <div class="ig-tab"><svg viewBox="0 0 24 24"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2" stroke="#8e8e8e" stroke-width="2"></path><circle cx="12" cy="7" r="4" stroke="#8e8e8e" stroke-width="2"></circle></svg></div>
                </div>
                <div class="ig-grid">${state.gridImages.map((img, i) => `<div class="ig-grid-item" onclick="document.getElementById('f-p-${i}').click()"><img src="${img}"><input type="file" id="f-p-${i}" onchange="simulatorAPI.upload(this, 'post', ${i})"></div>`).join('')}</div>
            `;
        },
        renderEdit(body) {
            body.innerHTML = `<div style="padding:15px;">
                <label style="font-size:10px; color:gray;">USERNAME</label><br><input type="text" id="in-name" value="${state.userName}" style="width:100%; margin-bottom:12px; border:1px solid #eee; padding:6px; font-size:13px;">
                <label style="font-size:10px; color:gray;">BIO</label><br><textarea id="in-bio" style="width:100%; margin-bottom:12px; border:1px solid #eee; padding:6px; font-size:13px;">${state.bio}</textarea>
                <div style="display:grid; grid-template-columns:repeat(3,1fr); gap:8px;">
                    <div><label style="font-size:10px;">POSTS</label><input type="text" id="in-posts" value="${state.postCount}" style="width:100%; font-size:12px;"></div>
                    <div><label style="font-size:10px;">FOLLOWERS</label><input type="text" id="in-followers" value="${state.followers}" style="width:100%; font-size:12px;"></div>
                    <div><label style="font-size:10px;">FOLLOWING</label><input type="text" id="in-following" value="${state.following}" style="width:100%; font-size:12px;"></div>
                </div>
            </div>`;
        },
        renderTheme(container) {
            container.innerHTML = `
                <div class="theme-panel">
                    <div class="tool-card">
                        <h4>Device Setting</h4>
                        <label style="display:flex; justify-content:space-between; cursor:pointer; font-size:12px; margin-bottom:10px;">
                            Display Frame <input type="checkbox" ${state.frameEnabled?'checked':''} onchange="state.frameEnabled=this.checked; simulatorAPI.save(); simulatorAPI.renderMain(); simulatorAPI.openApp('theme')">
                        </label>
                        <div class="range-group"><label>Width: ${state.width}px</label><input type="range" min="300" max="600" value="${state.width}" oninput="state.width=this.value; simulatorAPI.renderMain(); simulatorAPI.openApp('theme')"></div>
                        <div class="range-group"><label>Height: ${state.height}px</label><input type="range" min="500" max="900" value="${state.height}" oninput="state.height=this.value; simulatorAPI.renderMain(); simulatorAPI.openApp('theme')"></div>
                    </div>
                    
                    <div class="tool-card">
                        <h4>App Icons & Labels</h4>
                        ${state.apps.map((app, i) => `
                            <div class="icon-edit-row">
                                <div class="mini-icon">${app.letter}</div>
                                <input type="text" maxlength="1" class="input-letter" value="${app.letter}" oninput="state.apps[${i}].letter=this.value.toUpperCase(); simulatorAPI.save(); simulatorAPI.renderMain();">
                                <input type="text" class="input-name" value="${app.name}" oninput="state.apps[${i}].name=this.value; simulatorAPI.save(); simulatorAPI.renderMain();">
                            </div>
                        `).join('')}
                    </div>

                    <div class="tool-card">
                        <h4>Background</h4>
                        <button class="btn-black" onclick="document.getElementById('f-wp').click()">Change Wallpaper</button>
                        <input type="file" id="f-wp" onchange="simulatorAPI.upload(this, 'wallpaper')">
                    </div>
                </div>
            `;
        },
        upload(input, type, extra) {
            const file = input.files[0]; if(!file) return;
            const reader = new FileReader();
            reader.onload = (e) => {
                const data = e.target.result;
                if(type === 'avatar') state.userAvatar = data;
                else if(type === 'post') state.gridImages[extra] = data;
                else if(type === 'wallpaper') state.wallpaper = data;
                this.save(); this.renderMain(); this.openApp(type==='wallpaper' ? 'theme' : 'space');
            };
            reader.readAsDataURL(file);
        }
    };
    simulatorAPI.renderMain();
    setInterval(() => simulatorAPI.renderMain(), 30000);
</script>
</body>
</html>
