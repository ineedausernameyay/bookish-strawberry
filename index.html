<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Instagram Pixel Perfect v9.0</title>
    <style>
        :root {
            --ios-radius: 20px;
            --bg-blur: blur(25px);
            --font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Helvetica Neue", Arial, sans-serif;
            --ig-link: #0095f6;
            --ig-bg: #ffffff;
            --ig-secondary-btn: #efefef;
            --ig-icon-active: #000000;
            --ig-icon-inactive: #8e8e8e;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; outline: none; }
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background: #e2e2e2; font-family: var(--font-family); display: flex; justify-content: center; align-items: center; overflow: hidden; }

        #phone-wrapper { position: relative; background: #fff; overflow: hidden; transition: all 0.3s; display: flex; flex-direction: column; }
        .has-frame { border: 12px solid #1c1c1e; border-radius: 45px; box-shadow: 0 30px 60px rgba(0,0,0,0.3); }
        .is-fullscreen { width: 100vw !important; height: 100vh !important; border: none !important; border-radius: 0 !important; }

        #phone-container { flex: 1; position: relative; display: flex; flex-direction: column; background-color: #ffffff; background-size: cover; background-position: center; }

        /* Status Bar */
        .status-bar { height: 44px; display: flex; justify-content: space-between; align-items: center; padding: 0 24px; font-size: 14px; font-weight: 600; z-index: 1000; color: #000; }
        .status-icons { display: flex; gap: 8px; align-items: center; }
        .icon-svg { height: 14px; fill: currentColor; }

        /* Home Screen App Icons */
        .home-screen { flex: 1; padding: 25px; display: grid; grid-template-columns: repeat(4, 1fr); grid-auto-rows: min-content; gap: 25px; }
        .app-icon { display: flex; flex-direction: column; align-items: center; cursor: pointer; text-decoration: none; }
        .app-icon img { width: 60px; height: 60px; border-radius: 14px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); object-fit: cover; }
        .app-icon span { color: #000; font-size: 11px; margin-top: 6px; font-weight: 500; letter-spacing: -0.2px; text-align: center; }
        .dock { height: 90px; background: rgba(0, 0, 0, 0.05); backdrop-filter: var(--bg-blur); margin: 15px; border-radius: 30px; display: flex; justify-content: space-around; align-items: center; }

        /* App Window Layer */
        .app-window { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: #fff; z-index: 2000; display: none; flex-direction: column; }
        .app-header { padding: 40px 16px 10px; display: flex; justify-content: space-between; align-items: center; border-bottom: 0.5px solid #efefef; }
        .close-icon { font-size: 22px; font-weight: 300; color: #000; cursor: pointer; line-height: 1; }

        /* IG Profile 精密复刻 */
        .ig-nav-top { display: flex; justify-content: space-between; align-items: center; padding: 10px 16px; font-size: 20px; font-weight: 700; letter-spacing: -0.5px; }
        .ig-nav-icons { display: flex; gap: 22px; font-size: 24px; font-weight: 300; }

        .ig-profile-main { padding: 0 16px 14px; }
        .ig-stats-row { display: flex; align-items: center; justify-content: space-between; margin-top: 10px; }
        .ig-avatar { width: 80px; height: 80px; border-radius: 50%; padding: 2px; border: 1px solid #dbdbdb; object-fit: cover; }
        
        .ig-stats-box { display: flex; flex: 1; justify-content: space-around; margin-left: 15px; }
        .ig-stat-item { text-align: center; }
        .stat-num { font-weight: 700; font-size: 16px; display: block; color: #000; }
        .stat-label { font-size: 13px; color: #262626; font-weight: 400; }

        .ig-bio-section { padding: 0 16px 12px; font-size: 14px; line-height: 1.35; color: #000; }
        .ig-bio-name { font-weight: 700; display: block; margin-bottom: 1px; }

        .ig-action-btns { display: flex; gap: 6px; padding: 0 16px; margin-top: 4px; }
        .ig-btn { flex: 1; background: var(--ig-secondary-btn); border: none; border-radius: 8px; padding: 7px 0; font-size: 14px; font-weight: 600; cursor: pointer; color: #000; }
        .ig-btn-small { width: 32px; background: var(--ig-secondary-btn); border: none; border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 16px; }

        /* 精密图标栏 */
        .ig-tab-bar { display: flex; margin-top: 16px; border-top: 0.5px solid #efefef; }
        .ig-tab { flex: 1; display: flex; justify-content: center; align-items: center; padding: 10px 0; cursor: pointer; border-bottom: 1px solid transparent; }
        .ig-tab.active { border-bottom: 1px solid #000; }
        .ig-tab svg { width: 22px; height: 22px; fill: none; stroke: var(--ig-icon-inactive); stroke-width: 1.5; }
        .ig-tab.active svg { stroke: var(--ig-icon-active); }
        /* 针对 Grid 的特殊填充 */
        .ig-tab.active .svg-fill { fill: var(--ig-icon-active); stroke: none; }

        .ig-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 1px; background: #fff; }
        .ig-grid-item { aspect-ratio: 1; background: #fafafa; overflow: hidden; }
        .ig-grid-item img { width: 100%; height: 100%; object-fit: cover; }

        /* Tool Panels */
        .edit-panel { padding: 20px; }
        .edit-group { margin-bottom: 18px; }
        .edit-group label { display: block; font-size: 11px; color: #8e8e8e; text-transform: uppercase; margin-bottom: 5px; font-weight: 600; }
        .edit-group input, .edit-group textarea { width: 100%; border: 1px solid #efefef; background: #fafafa; border-radius: 8px; padding: 10px; font-size: 14px; }
        .tool-card { background: #f9f9f9; margin: 12px; padding: 18px; border-radius: 15px; border: 1px solid #eee; }
        .btn-black { background: #000; color: #fff; border: none; padding: 12px; border-radius: 10px; width: 100%; font-weight: 600; cursor: pointer; }
        input[type="range"] { width: 100%; margin: 10px 0; accent-color: #000; }
        input[type="file"] { display: none; }
    </style>
</head>
<body>

<div id="phone-wrapper" class="has-frame">
    <div id="phone-container">
        <div class="status-bar"><span id="clock">12:00</span>
            <div class="status-icons">
                <svg class="icon-svg" viewBox="0 0 24 24"><path d="M18.5 5v14.5M14.5 9v10.5M10.5 13v6.5M6.5 16v3.5" stroke="currentColor" stroke-width="2.5" fill="none"/></svg>
                <svg class="icon-svg" viewBox="0 0 24 24"><path d="M12 18.5l-8.5-9a11 11 0 0 1 17 0z" fill="currentColor"/></svg>
                <svg class="icon-svg" viewBox="0 0 24 24"><rect x="2" y="7" width="16" height="10" rx="2" stroke="currentColor" stroke-width="2" fill="none"/><rect x="4" y="9" width="11" height="6" rx="1" fill="currentColor"/><path d="M20 10v4" stroke="currentColor" stroke-width="2"/></svg>
            </div>
        </div>
        <div class="home-screen" id="home-grid"></div>
        <div class="dock" id="dock-grid"></div>

        <div id="app-layer" class="app-window">
            <div class="app-header">
                <span id="app-back-btn" class="close-icon">✕</span>
                <b id="active-app-name" style="font-size: 15px;">Instagram</b>
                <span id="app-action-btn" style="color:var(--ig-link); cursor:pointer; font-weight:600; font-size: 14px;"></span>
            </div>
            <div id="app-body" style="flex:1; overflow-y:auto;"></div>
        </div>
    </div>
</div>

<script>
    const IG_ICON = "https://cdn-icons-png.flaticon.com/512/3955/3955024.png";
    const DEFAULT_AVATAR = "data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 512 512'%3E%3Cpath fill='%23DBDBDB' d='M256 0C114.6 0 0 114.6 0 256s114.6 256 256 256 256-114.6 256-256S397.4 0 256 0zm0 464c-114.7 0-208-93.3-208-208S141.3 48 256 48s208 93.3 208 208-93.3 208-208 208z'/%3E%3Cpath fill='%23DBDBDB' d='M256 128c-44.1 0-80 35.9-80 80s35.9 80 80 80 80-35.9 80-80-35.9-80-80-80zm0 128c-26.5 0-48-21.5-48-48s21.5-48 48-48 48 21.5 48 48-21.5 48-48 48zm0 48c-70.7 0-128 57.3-128 128 0 8.8 7.2 16 16 16h224c8.8 0 16-7.2 16-16 0-70.7-57.3-128-128-128z'/%3E%3C/svg%3E";

    const INITIAL_STATE = {
        frameEnabled: true,
        width: 375, height: 750,
        wallpaper: '#FFFFFF',
        userName: 'username',
        bio: '',
        postCount: '0', followers: '0', following: '0',
        userAvatar: DEFAULT_AVATAR,
        gridImages: Array(9).fill('data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAAEAAAABCAYAAAAfFcSJAAAADUlEQVR42mN88P8/AAb0An7f96S3AAAAAElFTkSuQmCC'),
        apps: [
            { id: 'space', name: 'Instagram', icon: IG_ICON, isDock: true },
            { id: 'theme', name: 'Themes', icon: 'https://cdn-icons-png.flaticon.com/512/2097/2097276.png', isDock: true },
            { id: 'album', name: 'Photos', icon: 'https://cdn-icons-png.flaticon.com/512/2983/2983067.png', isDock: false },
            { id: 'setting', name: 'Settings', icon: 'https://cdn-icons-png.flaticon.com/512/2040/2040504.png', isDock: true }
        ]
    };

    let state = JSON.parse(localStorage.getItem('SIM_FINAL_V9')) || INITIAL_STATE;

    window.simulatorAPI = {
        save() { localStorage.setItem('SIM_FINAL_V9', JSON.stringify(state)); },
        renderMain() {
            const wrapper = document.getElementById('phone-wrapper');
            const container = document.getElementById('phone-container');
            wrapper.className = state.frameEnabled ? 'has-frame' : 'is-fullscreen';
            if(state.frameEnabled) { wrapper.style.width = state.width + 'px'; wrapper.style.height = state.height + 'px'; }
            container.style.backgroundColor = state.wallpaper.startsWith('#') ? state.wallpaper : '';
            container.style.backgroundImage = state.wallpaper.startsWith('#') ? 'none' : `url(${state.wallpaper})`;
            const home = document.getElementById('home-grid'), dock = document.getElementById('dock-grid');
            home.innerHTML = ''; dock.innerHTML = '';
            state.apps.forEach(app => {
                const div = document.createElement('div'); div.className = 'app-icon';
                div.innerHTML = `<img src="${app.icon}"><span>${app.name}</span>`;
                div.onclick = () => this.openApp(app.id);
                (app.isDock ? dock : home).appendChild(div);
            });
            const d = new Date(); document.getElementById('clock').innerText = String(d.getHours()).padStart(2,'0') + ":" + String(d.getMinutes()).padStart(2, '0');
        },
        openApp(id) {
            const layer = document.getElementById('app-layer'), body = document.getElementById('app-body'), actionBtn = document.getElementById('app-action-btn'), backBtn = document.getElementById('app-back-btn');
            layer.style.display = 'flex'; body.innerHTML = ''; actionBtn.innerText = '';
            backBtn.onclick = () => this.closeApp();
            if(id === 'space') { document.getElementById('active-app-name').innerText = 'Instagram'; this.renderIG(body); }
            else if(id === 'edit_profile') { 
                document.getElementById('active-app-name').innerText = 'Edit profile'; 
                backBtn.onclick = () => this.openApp('space');
                actionBtn.innerText = 'Done';
                actionBtn.onclick = () => {
                    state.userName = document.getElementById('in-name').value;
                    state.bio = document.getElementById('in-bio').value;
                    state.postCount = document.getElementById('in-posts').value;
                    state.followers = document.getElementById('in-followers').value;
                    state.following = document.getElementById('in-following').value;
                    this.save(); this.openApp('space');
                };
                this.renderEdit(body);
            }
            else if(id === 'theme') { document.getElementById('active-app-name').innerText = 'Themes'; this.renderTheme(body); }
        },
        closeApp() { document.getElementById('app-layer').style.display = 'none'; },
        renderIG(container) {
            container.innerHTML = `
                <div class="ig-nav-top"><span>${state.userName}</span><div class="ig-nav-icons"><span>+</span><span>☰</span></div></div>
                <div class="ig-profile-main">
                    <div class="ig-stats-row">
                        <img src="${state.userAvatar}" class="ig-avatar" onclick="document.getElementById('f-av').click()">
                        <input type="file" id="f-av" onchange="simulatorAPI.upload(this, 'avatar')">
                        <div class="ig-stats-box">
                            <div class="ig-stat-item"><span class="stat-num">${state.postCount}</span><span class="stat-label">posts</span></div>
                            <div class="ig-stat-item"><span class="stat-num">${state.followers}</span><span class="stat-label">followers</span></div>
                            <div class="ig-stat-item"><span class="stat-num">${state.following}</span><span class="stat-label">following</span></div>
                        </div>
                    </div>
                </div>
                <div class="ig-bio-section"><span class="ig-bio-name">${state.userName}</span><div style="white-space:pre-wrap;">${state.bio}</div></div>
                <div class="ig-action-btns">
                    <button class="ig-btn" onclick="simulatorAPI.openApp('edit_profile')">Edit profile</button>
                    <button class="ig-btn">Share profile</button>
                    <button class="ig-btn-small">👤</button>
                </div>
                <div class="ig-tab-bar">
                    <div class="ig-tab active"><svg viewBox="0 0 24 24"><rect x="3" y="3" width="18" height="18" rx="1" stroke-width="1.8"></rect><line x1="3" y1="9" x2="21" y2="9" stroke-width="1.5"></line><line x1="3" y1="15" x2="21" y2="15" stroke-width="1.5"></line><line x1="9" y1="3" x2="9" y2="21" stroke-width="1.5"></line><line x1="15" y1="3" x2="15" y2="21" stroke-width="1.5"></line></svg></div>
                    <div class="ig-tab"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M17 2l4 4-4 4" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"></path><path d="M3 11v-1a4 4 0 0 1 4-4h14" stroke-width="2" stroke-linecap="round"></path><path d="M7 22l-4-4 4-4" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"></path><path d="M21 13v1a4 4 0 0 1-4 4H3" stroke-width="2" stroke-linecap="round"></path></svg></div>
                    <div class="ig-tab"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2" stroke-width="2"></path><circle cx="12" cy="7" r="4" stroke-width="2"></circle></svg></div>
                </div>
                <div class="ig-grid">${state.gridImages.map((img, i) => `<div class="ig-grid-item" onclick="document.getElementById('f-p-${i}').click()"><img src="${img}"><input type="file" id="f-p-${i}" onchange="simulatorAPI.upload(this, 'post', ${i})"></div>`).join('')}</div>
            `;
        },
        renderEdit(container) {
            container.innerHTML = `
                <div class="edit-panel">
                    <div class="edit-group"><label>Username</label><input type="text" id="in-name" value="${state.userName}"></div>
                    <div class="edit-group"><label>Bio</label><textarea id="in-bio" rows="3">${state.bio}</textarea></div>
                    <div style="display:grid; grid-template-columns:repeat(3,1fr); gap:10px;">
                        <div class="edit-group"><label>Posts</label><input type="text" id="in-posts" value="${state.postCount}"></div>
                        <div class="edit-group"><label>Followers</label><input type="text" id="in-followers" value="${state.followers}"></div>
                        <div class="edit-group"><label>Following</label><input type="text" id="in-following" value="${state.following}"></div>
                    </div>
                </div>
            `;
        },
        renderTheme(container) {
            container.innerHTML = `
                <div class="tool-card"><h4>Frame Settings</h4><label style="display:flex; justify-content:space-between;">Show Frame <input type="checkbox" ${state.frameEnabled?'checked':''} onchange="state.frameEnabled=this.checked; simulatorAPI.save(); simulatorAPI.renderMain(); simulatorAPI.openApp('theme')"></label></div>
                <div class="tool-card"><h4>Wallpaper</h4><button class="btn-black" onclick="document.getElementById('f-wp').click()">Upload</button><input type="file" id="f-wp" onchange="simulatorAPI.upload(this, 'wallpaper')"></div>
                <div class="tool-card"><h4>App Icons</h4><div style="display:grid; grid-template-columns:repeat(4,1fr); gap:10px;">
                    ${state.apps.map(app => `<div onclick="document.getElementById('f-app-${app.id}').click()" style="text-align:center;"><img src="${app.icon}" style="width:40px;height:40px;border-radius:8px;border:1px solid #eee;"><input type="file" id="f-app-${app.id}" onchange="simulatorAPI.upload(this, 'app-icon', '${app.id}')"></div>`).join('')}
                </div></div>
            `;
        },
        upload(input, type, extra) {
            const file = input.files[0]; if(!file) return;
            const reader = new FileReader();
            reader.onload = (e) => {
                const data = e.target.result;
                if(type === 'avatar') state.userAvatar = data;
                else if(type === 'post') state.gridImages[extra] = data;
                else if(type === 'wallpaper') state.wallpaper = data;
                else if(type === 'app-icon') { const app = state.apps.find(a => a.id === extra); if(app) app.icon = data; }
                this.save(); this.renderMain(); this.openApp(type.includes('app') || type==='wallpaper' ? 'theme' : 'space');
            };
            reader.readAsDataURL(file);
        }
    };
    simulatorAPI.renderMain();
</script>
</body>
</html>
