<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Dontchangetitle</title>
    <style>
        :root {
            --ios-radius: 20px;
            --font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Helvetica Neue", Arial, sans-serif;
            --ig-secondary-btn: #f1f2f6;
            --ig-icon-inactive: #8e8e8e;
            --border-color-white: #ffffff;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; outline: none; }
        
        /* bg outside frame */
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background: #ffffff; font-family: var(--font-family); display: flex; justify-content: center; align-items: center; overflow: hidden; }

        #phone-wrapper { position: relative; background: #fff; overflow: hidden; transition: width 0.1s, height 0.1s; display: flex; flex-direction: column; }
        .has-frame { border: 12px solid #1c1c1e; border-radius: 45px; box-shadow: 0 30px 60px rgba(0,0,0,0.1); }
        .is-fullscreen { width: 100vw !important; height: 100vh !important; border: none !important; border-radius: 0 !important; }

        #phone-container { flex: 1; position: relative; display: flex; flex-direction: column; background-color: #ffffff; background-size: cover; background-position: center; }

        /* status bar*/
        .status-bar { position: absolute; top: 0; width: 100%; height: 44px; display: flex; justify-content: space-between; align-items: center; padding: 0 24px; font-size: 14px; font-weight: 600; z-index: 5000; color: #000; }
        .status-icons { display: flex; gap: 8px; align-items: center; }
        .icon-svg { height: 14px; fill: currentColor; }

        /* app icon */
        .home-screen { flex: 1; padding: 50px 15px 30px; display: grid; grid-template-columns: repeat(4, 1fr); grid-auto-rows: min-content; gap: 20px; align-content: start; justify-items: center; }
        .app-icon { display: flex; flex-direction: column; align-items: center; cursor: pointer; text-decoration: none; width: 100%; }
        
        .app-icon-box { 
            width: 48px; height: 48px; border-radius: 12px; 
            background: #000; display: flex; align-items: center; 
            justify-content: center; box-shadow: 0 2px 8px rgba(0,0,0,0.1); 
            overflow: hidden;
        }
        .app-icon-box img { width: 100%; height: 100%; object-fit: cover; }
        .app-icon-box span { font-size: 24px; color: #fff; font-weight: 600; }
        .app-icon span.app-label { color: #000; font-size: 11px; margin-top: 6px; font-weight: 500; letter-spacing: -0.2px; text-align: center; width: 100%; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

        .app-window { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: #fff; z-index: 2000; display: none; flex-direction: column; }
        /* Header bg */
        .app-header { padding: 44px 16px 10px; display: flex; justify-content: space-between; align-items: center; border-bottom: 0.5px solid #eee; background: #fff; }
        .close-icon { font-size: 22px; font-weight: 300; color: #000; cursor: pointer; line-height: 1; }

        /* ig css */
        .ig-nav-top { display: flex; justify-content: space-between; align-items: center; padding: 4px 16px 0; font-size: 18px; font-weight: 700; letter-spacing: -0.5px; }
        .at-symbol { letter-spacing: 0.8px; display: inline-block; }
        .ig-nav-icons { display: flex; gap: 10px; font-size: 24px; font-weight: 300; }
        .ig-profile-main { padding: 0 16px 6px; }
        .ig-stats-row { display: flex; align-items: center; justify-content: space-between; margin-top: 4px; }
        .ig-avatar { width: 80px; height: 80px; border-radius: 50%; padding: 2px; border: 1px solid var(--border-color-white); object-fit: cover; }
        .ig-stats-box { display: flex; flex: 1; justify-content: space-around; margin-left: 15px; }
        .ig-stat-item { text-align: left; }
        .stat-num { font-weight: 700; font-size: 16px; display: block; color: #000; }
        .stat-label { font-size: 13px; color: #262626; font-weight: 400; }
        .ig-bio-section { padding: 0 16px 10px; font-size: 14px; line-height: 1.35; color: #000; }
        .ig-bio-name { font-weight: 700; display: block; margin-bottom: 1px; }
        .ig-action-btns { display: flex; gap: 6px; padding: 0 16px; margin-top: 2px; }
        .ig-btn { flex: 1; background: var(--ig-secondary-btn); border: none; border-radius: 8px; padding: 4px 0; font-size: 13px; font-weight: 600; cursor: pointer; color: #000; letter-spacing: -0.2px; height: 32px; }
        .ig-btn-small { width: 32px; height: 32px; background: var(--ig-secondary-btn); border: none; border-radius: 8px; display: flex; align-items: center; justify-content: center; cursor: pointer; padding: 0; }
        .ig-btn-small svg { width: 18px; height: 18px; stroke: #000; stroke-width: 2.2; fill: none; }
        .ig-tab-bar { display: flex; margin-top: 14px; border-top: 0.5px solid var(--border-color-white); }
        .ig-tab { flex: 1; display: flex; justify-content: center; align-items: center; padding: 12px 0; cursor: pointer; border-bottom: 1px solid transparent; }
        .ig-tab.active { border-bottom: 1px solid #000; }
        .ig-tab svg { width: 24px; height: 24px; fill: none; stroke: var(--ig-icon-inactive); stroke-width: 1.5; }
        .ig-tab.active svg { stroke: #000; }
        .ig-tab.active .svg-grid rect { fill: #000; stroke: none; } 
        .ig-tab.active .svg-grid line { stroke: #fff !important; stroke-width: 1.2px; }
        .ig-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 1px; background: #ffffff; }
        .ig-grid-item { aspect-ratio: 1; background: #fafafa; overflow: hidden; position: relative; }
        .ig-grid-item img { width: 100%; height: 100%; object-fit: cover; position: absolute; top: 0; left: 0; }

        .themes-container { display: flex; flex-direction: column; height: 100%; padding: 10px; overflow: hidden; }
        .tool-card { background: #f9f9f9; padding: 12px; border-radius: 12px; border: 1px solid #eee; margin-bottom: 8px; }
        .tool-card h4 { margin: 0 0 8px 0; font-size: 12px; color: #888; text-transform: uppercase; }
        .range-group { margin-bottom: 8px; }
        .range-group label { font-size: 11px; color: #666; display: flex; justify-content: space-between; }
        .range-group input { width: 100%; height: 20px; accent-color: #000; }
        
        .icon-grid-edit { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; }
        .icon-edit-item { display: flex; flex-direction: column; align-items: center; font-size: 9px; cursor: pointer; }
        .icon-edit-preview { width: 36px; height: 36px; border-radius: 8px; background: #000; overflow: hidden; margin-bottom: 4px; display: flex; align-items: center; justify-content: center; color: #fff; font-weight: bold; font-size: 16px; }
        .icon-edit-preview img { width: 100%; height: 100%; object-fit: cover; }

        .btn-black { background: #000; color: #fff; border: none; padding: 8px; border-radius: 8px; width: 100%; font-weight: 600; font-size: 12px; cursor: pointer; }
        input[type="file"] { display: none; }
    </style>
</head>
<body>

<div id="phone-wrapper" class="has-frame">
    <div id="phone-container">
        <div class="status-bar">
            <span id="clock">12:00</span>
            <div class="status-icons">
                <svg class="icon-svg" viewBox="0 0 24 24"><path d="M18.5 5v14.5M14.5 9v10.5M10.5 13v6.5M6.5 16v3.5" stroke="currentColor" stroke-width="2.5" fill="none"/></svg>
                <svg class="icon-svg" viewBox="0 0 24 24"><path d="M12 18.5l-8.5-9a11 11 0 0 1 17 0z" fill="currentColor"/></svg>
                <svg class="icon-svg" viewBox="0 0 24 24"><rect x="2" y="7" width="16" height="10" rx="2" stroke="currentColor" stroke-width="2" fill="none"/><rect x="4" y="9" width="11" height="6" rx="1" fill="currentColor"/></svg>
            </div>
        </div>

        <div class="home-screen" id="home-grid"></div>

        <div id="app-layer" class="app-window">
            <div class="app-header">
                <span id="app-back-btn" class="close-icon">✕</span>
                <b id="active-app-name" style="font-size: 15px;"></b>
                <span id="app-action-btn" style="color:#0095f6; cursor:pointer; font-weight:600; font-size: 14px;"></span>
            </div>
            <div id="app-body" style="flex:1; overflow-y:auto; background: #fff;"></div>
        </div>
    </div>
</div>

<script>
    const STORAGE_KEY = 'PIXEL_SIM_DATA_V105';
    const DEFAULT_AVATAR = "data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 512 512'%3E%3Cpath fill='%23DBDBDB' d='M256 0C114.6 0 0 114.6 0 256s114.6 256 256 256 256-114.6 256-256S397.4 0 256 0zm0 464c-114.7 0-208-93.3-208-208S141.3 48 256 48s208 93.3 208 208-93.3 208-208 208z'/%3E%3Cpath fill='%23DBDBDB' d='M256 128c-44.1 0-80 35.9-80 80s35.9 80 80 80 80-35.9 80-80-35.9-80-80-80zm0 128c-26.5 0-48-21.5-48-48s21.5-48 48-48 48 21.5 48 48-21.5 48-48 48zm0 48c-70.7 0-128 57.3-128 128 0 8.8 7.2 16 16 16h224c8.8 0 16-7.2 16-16 0-70.7-57.3-128-128-128z'/%3E%3C/svg%3E";
    const EMPTY_POST = 'data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAAEAAAABCAYAAAAfFcSJAAAADUlEQVR42mN88P8/AAb0An7f96S3AAAAAElFTkSuQmCC';

    const INITIAL_STATE = {
        frameEnabled: true,
        width: 375, height: 750,
        wallpaper: '#FFFFFF',
        userName: 'username',
        bio: '',
        postCount: '0', followers: '0', following: '0',
        userAvatar: DEFAULT_AVATAR,
        gridImages: Array(9).fill(EMPTY_POST),
        apps: [
            { id: 'space', name: 'Instagram', letter: 'I', icon: '' },
            { id: 'theme', name: 'Themes', letter: 'T', icon: '' },
            { id: 'album', name: 'Photos', letter: 'P', icon: '' },
            { id: 'setting', name: 'Settings', letter: 'S', icon: '' }
        ]
    };

    let state = JSON.parse(localStorage.getItem(STORAGE_KEY)) || INITIAL_STATE;

    window.simulatorAPI = {
        save() { localStorage.setItem(STORAGE_KEY, JSON.stringify(state)); },

        renderMain() {
            const wrapper = document.getElementById('phone-wrapper');
            const container = document.getElementById('phone-container');
            wrapper.className = state.frameEnabled ? 'has-frame' : 'is-fullscreen';
            if(state.frameEnabled) { wrapper.style.width = state.width + 'px'; wrapper.style.height = state.height + 'px'; }
            
            container.style.backgroundColor = state.wallpaper.startsWith('#') ? state.wallpaper : '#fff';
            container.style.backgroundImage = state.wallpaper.startsWith('#') ? 'none' : `url(${state.wallpaper})`;
            
            const home = document.getElementById('home-grid');
            home.innerHTML = '';
            state.apps.forEach(app => {
                const div = document.createElement('div'); div.className = 'app-icon';
                div.innerHTML = `
                    <div class="app-icon-box">${app.icon ? `<img src="${app.icon}">` : `<span>${app.letter}</span>`}</div>
                    <span class="app-label">${app.name}</span>
                `;
                div.onclick = () => this.openApp(app.id);
                home.appendChild(div);
            });
            this.updateClock();
        },

        updateClock() {
            const d = new Date();
            document.getElementById('clock').innerText = String(d.getHours()).padStart(2,'0') + ":" + String(d.getMinutes()).padStart(2, '0');
        },

        openApp(id) {
            const layer = document.getElementById('app-layer'), body = document.getElementById('app-body'), actionBtn = document.getElementById('app-action-btn'), backBtn = document.getElementById('app-back-btn'), activeTitle = document.getElementById('active-app-name');
            layer.style.display = 'flex'; body.innerHTML = ''; actionBtn.innerText = '';
            backBtn.onclick = () => this.closeApp();

            if(id === 'space') { activeTitle.innerText = ''; this.renderIG(body); }
            else if(id === 'theme') { activeTitle.innerText = 'Themes'; this.renderTheme(body); }
            else if(id === 'edit_profile') { 
                activeTitle.innerText = 'Edit profile'; 
                backBtn.onclick = () => this.openApp('space');
                actionBtn.innerText = 'Done';
                actionBtn.onclick = () => {
                    state.userName = document.getElementById('in-name').value;
                    state.bio = document.getElementById('in-bio').value;
                    state.postCount = document.getElementById('in-posts').value;
                    state.followers = document.getElementById('in-followers').value;
                    state.following = document.getElementById('in-following').value;
                    this.save(); this.openApp('space');
                };
                this.renderEdit(body);
            }
        },

        closeApp() { document.getElementById('app-layer').style.display = 'none'; },

        renderIG(container) {
            container.innerHTML = `
                <div class="ig-nav-top"><span><span class="at-symbol">@</span>${state.userName}</span><div class="ig-nav-icons"><span>☰</span></div></div>
                <div class="ig-profile-main">
                    <div class="ig-stats-row">
                        <img src="${state.userAvatar}" class="ig-avatar" onclick="document.getElementById('f-av').click()">
                        <input type="file" id="f-av" onchange="simulatorAPI.upload(this, 'avatar')">
                        <div class="ig-stats-box">
                            <div class="ig-stat-item"><span class="stat-num">${state.postCount}</span><span class="stat-label">posts</span></div>
                            <div class="ig-stat-item"><span class="stat-num">${state.followers}</span><span class="stat-label">followers</span></div>
                            <div class="ig-stat-item"><span class="stat-num">${state.following}</span><span class="stat-label">following</span></div>
                        </div>
                    </div>
                </div>
                <div class="ig-bio-section"><span class="ig-bio-name">${state.userName}</span><div style="white-space:pre-wrap;">${state.bio}</div></div>
                <div class="ig-action-btns">
                    <button class="ig-btn" onclick="simulatorAPI.openApp('edit_profile')">Edit profile</button>
                    <button class="ig-btn">Share profile</button>
                    <button class="ig-btn-small"><svg viewBox="0 0 24 24"><line x1="1" y1="11" x2="7" y2="11"></line><line x1="4" y1="8" x2="4" y2="14"></line><path d="M23 21v-2a4 4 0 0 0-4-4H11a4 4 0 0 0-4 4v2"></path><circle cx="15" cy="7" r="4"></circle></svg></button>
                </div>
                <div class="ig-tab-bar">
                    <div class="ig-tab active"><svg class="svg-grid" viewBox="0 0 24 24"><rect x="3" y="3" width="18" height="18" rx="1"></rect><line x1="3" y1="9" x2="21" y2="9"></line><line x1="3" y1="15" x2="21" y2="15"></line><line x1="9" y1="3" x2="9" y2="21"></line><line x1="15" y1="3" x2="15" y2="21"></line></svg></div>
                    <div class="ig-tab"><svg viewBox="0 0 24 24"><path d="M17 2l4 4-4 4" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"></path><path d="M3 11v-1a4 4 0 0 1 4-4h14" stroke-width="2" stroke-linecap="round"></path><path d="M7 22l-4-4 4-4" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"></path><path d="M21 13v1a4 4 0 0 1-4 4H3" stroke-width="2" stroke-linecap="round"></path></svg></div>
                    <div class="ig-tab"><svg viewBox="0 0 24 24"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2" stroke-width="2"></path><circle cx="12" cy="7" r="4" stroke-width="2"></circle></svg></div>
                </div>
                <div class="ig-grid">${state.gridImages.map((img, i) => `<div class="ig-grid-item" onclick="document.getElementById('f-p-${i}').click()"><img src="${img}"><input type="file" id="f-p-${i}" onchange="simulatorAPI.upload(this, 'post', ${i})"></div>`).join('')}</div>
            `;
        },

        renderTheme(container) {
            container.innerHTML = `
                <div class="themes-container">
                    <div class="tool-card">
                        <h4>Device Frame</h4>
                        <label style="display:flex; justify-content:space-between; font-size:12px; margin-bottom:8px;">
                            Show Frame <input type="checkbox" ${state.frameEnabled?'checked':''} onchange="state.frameEnabled=this.checked; simulatorAPI.save(); simulatorAPI.renderMain();">
                        </label>
                        <div class="range-group">
                            <label>Width <span>${state.width}px</span></label>
                            <input type="range" min="300" max="600" value="${state.width}" oninput="state.width=this.value; simulatorAPI.save(); simulatorAPI.renderMain(); this.previousElementSibling.querySelector('span').innerText=this.value+'px'">
                        </div>
                        <div class="range-group">
                            <label>Height <span>${state.height}px</span></label>
                            <input type="range" min="500" max="900" value="${state.height}" oninput="state.height=this.value; simulatorAPI.save(); simulatorAPI.renderMain(); this.previousElementSibling.querySelector('span').innerText=this.value+'px'">
                        </div>
                    </div>
                    <div class="tool-card">
                        <h4>Wallpaper</h4>
                        <button class="btn-black" onclick="document.getElementById('f-wp').click()">Upload Photo</button>
                        <input type="file" id="f-wp" onchange="simulatorAPI.upload(this, 'wallpaper')">
                    </div>
                    <div class="tool-card">
                        <h4>App Icons</h4>
                        <div class="icon-grid-edit">
                            ${state.apps.map((app, i) => `
                                <div class="icon-edit-item" onclick="document.getElementById('f-ic-${i}').click()">
                                    <div class="icon-edit-preview">
                                        ${app.icon ? `<img src="${app.icon}">` : `<span>${app.letter}</span>`}
                                    </div>
                                    <span>${app.name}</span>
                                    <input type="file" id="f-ic-${i}" onchange="simulatorAPI.upload(this, 'app-icon', ${i})">
                                </div>
                            `).join('')}
                        </div>
                    </div>
                </div>
            `;
        },

        renderEdit(body) {
            body.innerHTML = `<div class="edit-panel">
                <div class="edit-group"><label>Username</label><input type="text" id="in-name" value="${state.userName}"></div>
                <div class="edit-group"><label>Bio</label><textarea id="in-bio" rows="3">${state.bio}</textarea></div>
                <div style="display:grid; grid-template-columns:repeat(3,1fr); gap:10px;">
                    <div class="edit-group"><label>Posts</label><input type="text" id="in-posts" value="${state.postCount}"></div>
                    <div class="edit-group"><label>Followers</label><input type="text" id="in-followers" value="${state.followers}"></div>
                    <div class="edit-group"><label>Following</label><input type="text" id="in-following" value="${state.following}"></div>
                </div>
            </div>`;
        },

        upload(input, type, extra) {
            const file = input.files[0]; if(!file) return;
            const reader = new FileReader();
            reader.onload = (e) => {
                const data = e.target.result;
                if(type === 'avatar') state.userAvatar = data;
                else if(type === 'post') state.gridImages[extra] = data;
                else if(type === 'wallpaper') state.wallpaper = data;
                else if(type === 'app-icon') state.apps[extra].icon = data;
                
                this.save();
                this.renderMain();
                // new update here
                const body = document.getElementById('app-body');
                if(type === 'avatar' || type === 'post') this.renderIG(body);
                if(type === 'app-icon') this.renderTheme(body);
            };
            reader.readAsDataURL(file);
        }
    };

    simulatorAPI.renderMain();
    setInterval(() => simulatorAPI.updateClock(), 10000);
</script>
</body>
</html>
